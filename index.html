<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="TaskFlow"/>
  <meta name="theme-color" content="#A8E6CF"/>
  <meta name="description" content="Your AI-powered minimalist task manager"/>
  <title>TaskFlow</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" href="icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:#F0F4F8;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  color:#1a1a1a;
}
#root{height:100%}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input,select,button,textarea{font-family:'DM Sans',sans-serif}

/* ── Keyframes ── */
@keyframes slideUp{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes popBounce{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes taskAppear{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes toastIn{from{transform:translateY(20px) translateX(-50%);opacity:0}to{transform:translateY(0) translateX(-50%);opacity:1}}
@keyframes toastOut{from{transform:translateY(0) translateX(-50%);opacity:1}to{transform:translateY(20px) translateX(-50%);opacity:0}}

/* ── App shell ── */
.app-shell{
  height:100dvh;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#edfaf4 0%,#fdf5ef 50%,#f0ecfc 100%);
  position:relative;overflow:hidden;
}

/* ── Screen ── */
.screen{
  flex:1;overflow-y:auto;
  padding-top:env(safe-area-inset-top);
  will-change:opacity,transform;
}
.screen.entering{animation:slideDown 0.22s cubic-bezier(.2,.8,.4,1) forwards}

/* ── Header area ── */
.screen-pad{padding:0 20px 120px}
.page-header{padding:20px 0 24px}
.page-eyebrow{font-size:11px;font-weight:700;color:#c0c0c0;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:'Fraunces',serif;font-size:34px;font-weight:500;color:#1a1a1a;letter-spacing:-1px;line-height:1.05}
.page-subtitle{font-size:13px;color:#b0b0b0;margin-top:6px;font-weight:500}

/* ── Progress strip ── */
.progress-row{display:flex;align-items:center;gap:10;margin-top:14px}
.progress-track{flex:1;height:3.5px;border-radius:10px;background:#e5e5e5;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#A8E6CF,#5ec99a);transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:11.5px;font-weight:700;color:#c0c0c0;white-space:nowrap}

/* ── Section label ── */
.slabel{font-size:10.5px;font-weight:700;letter-spacing:1.4px;color:#c8c8c8;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.slabel-count{background:#f0f0f0;color:#b0b0b0;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}

/* ── Task card ── */
.task-card{
  background:white;border-radius:20px;
  padding:14px 15px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.05);
  margin-bottom:9px;
  transition:transform 0.2s ease,box-shadow 0.2s ease,opacity 0.2s ease;
  position:relative;
  -webkit-user-select:none;user-select:none;
  animation:taskAppear 0.25s ease;
  border:1px solid rgba(255,255,255,0.8);
}
.task-card:active{transform:scale(0.982);box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.task-card.done-card{background:linear-gradient(135deg,#f9fffe,#f5fffe)}
.task-card.removing{animation:fadeIn 0.2s ease reverse;opacity:0;transform:translateX(20px)}

/* ── Check circle ── */
.check-circle{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:2px solid #daeee6;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.28s cubic-bezier(.34,1.56,.64,1);
  background:white;
}
.check-circle.done{
  background:linear-gradient(135deg,#A8E6CF,#5ec99a);
  border-color:#5ec99a;
  transform:scale(1.1);
  box-shadow:0 2px 10px rgba(94,201,154,0.4);
}

/* ── Task text ── */
.task-text{
  flex:1;font-size:15px;font-weight:500;color:#1e1e1e;
  line-height:1.4;transition:color 0.2s ease;
}
.task-text.done{color:#c8c8c8;text-decoration:line-through;text-decoration-color:#d0d0d0}
.task-priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:-4px}

/* ── Kebab & context menu ── */
.kebab-btn{
  width:32px;height:32px;border-radius:10px;border:none;
  background:transparent;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  color:#d0d0d0;transition:all 0.15s ease;opacity:0;
}
.task-card:hover .kebab-btn,.task-card:focus-within .kebab-btn{opacity:1}
.kebab-btn:active{background:#f2f2f2;color:#999}
.ctx-menu{
  position:absolute;right:10px;top:50px;z-index:300;
  background:white;border-radius:18px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15),0 2px 8px rgba(0,0,0,0.06);
  overflow:hidden;min-width:155px;
  animation:fadeIn 0.14s ease;
  border:1px solid rgba(0,0,0,0.04);
}
.ctx-item{
  padding:13px 16px;font-size:13.5px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  border:none;background:none;width:100%;text-align:left;color:#333;
  transition:background 0.1s;-webkit-tap-highlight-color:transparent;
}
.ctx-item:active{background:#f5f5f5}
.ctx-item.danger{color:#ff5050}
.ctx-item.danger:active{background:#fff2f2}
.ctx-separator{height:1px;background:#f5f5f5;margin:2px 0}

/* ── Add task inline ── */
.add-task-box{
  background:white;border-radius:20px;
  padding:14px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 24px rgba(168,230,207,0.12);
  margin-bottom:12px;
  border:1.5px solid rgba(168,230,207,0.5);
  animation:slideDown 0.2s ease;
}

/* ── AI Plan My Day button ── */
.plan-btn{
  width:100%;padding:15px 20px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  border:none;border-radius:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  color:white;font-size:15px;font-weight:600;
  box-shadow:0 6px 24px rgba(102,126,234,0.35);
  transition:all 0.2s cubic-bezier(.34,1.2,.64,1);
  margin-bottom:16px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.plan-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  border-radius:inherit;
}
.plan-btn:active{transform:scale(0.97);box-shadow:0 2px 10px rgba(102,126,234,0.25)}
.plan-btn:disabled{opacity:0.7;cursor:not-allowed}
.plan-btn .spinner{
  width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:white;border-radius:50%;
  animation:spin 0.7s linear infinite;
}

/* ── AI shimmer skeleton ── */
.ai-skeleton{
  background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
  border-radius:12px;height:52px;margin-bottom:9px;
}

/* ── AI badge on tasks ── */
.ai-badge{
  font-size:9px;font-weight:700;letter-spacing:0.5px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;padding:2px 7px;border-radius:20px;
  flex-shrink:0;text-transform:uppercase;
}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:56px 20px;
  animation:fadeIn 0.3s ease;
}
.empty-icon{font-size:52px;margin-bottom:16px;display:block;animation:popBounce 0.4s ease}
.empty-title{font-size:18px;font-weight:600;color:#2a2a2a;margin-bottom:8px;font-family:'Fraunces',serif}
.empty-sub{font-size:14px;color:#b0b0b0;line-height:1.5}

/* ── Pill input ── */
.pill-input{
  width:100%;padding:14px 16px;border-radius:16px;
  border:1.5px solid #ebebeb;font-size:16px;
  outline:none;color:#1a1a1a;
  background:#f9f9f9;transition:all 0.18s ease;
  -webkit-appearance:none;appearance:none;
}
.pill-input:focus{border-color:#A8E6CF;background:white;box-shadow:0 0 0 3.5px rgba(168,230,207,0.2)}
.pill-input::placeholder{color:#c8c8c8}

/* ── Pill button ── */
.pill-btn{
  padding:13px 22px;border-radius:50px;border:none;
  cursor:pointer;font-size:15px;font-weight:600;
  transition:all 0.18s cubic-bezier(.34,1.2,.64,1);
  -webkit-tap-highlight-color:transparent;
  display:inline-flex;align-items:center;gap:7px;
}
.pill-btn:active{transform:scale(0.95)}
.pill-btn-primary{background:linear-gradient(135deg,#A8E6CF,#5ec99a);color:white;box-shadow:0 4px 16px rgba(94,201,154,0.35)}
.pill-btn-ghost{background:#f0f0f0;color:#999}
.pill-btn-danger{background:#fff2f2;color:#ff5050}

/* ── FAB ── */
.fab{
  position:fixed;
  bottom:calc(88px + env(safe-area-inset-bottom));
  right:20px;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#A8E6CF,#5ec99a);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(94,201,154,0.5),0 2px 8px rgba(0,0,0,0.08);
  transition:all 0.28s cubic-bezier(.34,1.56,.64,1);
  z-index:60;-webkit-tap-highlight-color:transparent;
  color:white;font-size:26px;font-weight:300;
}
.fab:active{transform:scale(0.92)}
.fab.open{background:linear-gradient(135deg,#ff8a80,#ff5252)}
.cal-fab{background:linear-gradient(135deg,#FFD3B6,#ffaa6e);box-shadow:0 6px 24px rgba(255,170,110,0.48),0 2px 8px rgba(0,0,0,0.08)}

/* ── Bottom nav ── */
.bottom-nav{
  position:relative;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border-top:1px solid rgba(255,255,255,0.95);
  padding:6px 12px;
  padding-bottom:calc(6px + env(safe-area-inset-bottom));
  display:flex;
  box-shadow:0 -4px 30px rgba(0,0,0,0.06);
  z-index:100;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;flex:1;padding:7px 6px;
  border:none;background:none;cursor:pointer;
  border-radius:20px;transition:all 0.2s ease;
  font-size:10px;font-weight:600;color:#c8c8c8;letter-spacing:0.3px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn.active{color:#2a2a2a}
.nav-btn.active .icon-wrap{background:linear-gradient(135deg,#A8E6CF,#5ec99a);box-shadow:0 4px 16px rgba(94,201,154,0.4)}
.icon-wrap{
  width:44px;height:44px;border-radius:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.28s cubic-bezier(.34,1.56,.64,1);
}

/* ── Modal ── */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.28);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;
  z-index:400;
}
.modal-sheet{
  width:100%;background:white;
  border-radius:30px 30px 0 0;
  padding:10px 22px;
  padding-bottom:calc(30px + env(safe-area-inset-bottom));
  box-shadow:0 -12px 60px rgba(0,0,0,0.12);
  animation:slideUp 0.28s cubic-bezier(.34,1.2,.64,1);
  max-height:92dvh;overflow-y:auto;
}
.modal-handle{width:38px;height:4px;border-radius:4px;background:#e8e8e8;margin:10px auto 22px}
.modal-title{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:#1a1a1a;margin-bottom:22px}
.form-label{font-size:10.5px;font-weight:700;color:#c0c0c0;letter-spacing:1.3px;text-transform:uppercase;display:block;margin-bottom:7px}

/* ── Emoji & color pickers ── */
.emoji-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ep-btn{
  width:44px;height:44px;border-radius:13px;border:2.5px solid transparent;
  background:#f6f6f6;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s ease;-webkit-tap-highlight-color:transparent;
}
.ep-btn.sel{border-color:#A8E6CF;background:rgba(168,230,207,0.15)}
.ep-btn:active{transform:scale(0.88)}
.color-row{display:flex;gap:11px;margin-bottom:0}
.c-dot{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all 0.15s ease;
  -webkit-tap-highlight-color:transparent;
}
.c-dot.sel{border-color:#3a3a3a;transform:scale(1.18)}

/* ── Schedule cards ── */
.sched-card{
  background:white;border-radius:20px;padding:14px 15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.04);
  display:flex;align-items:center;gap:12px;
  transition:all 0.22s ease;position:relative;
  border:1px solid rgba(255,255,255,0.8);
}
.sched-card:active{transform:scale(0.985)}
.sched-emoji-box{
  width:44px;height:44px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}

/* ── Date chip ── */
.date-chip{
  display:flex;flex-direction:column;align-items:center;
  min-width:50px;padding:12px 7px;border-radius:19px;
  cursor:pointer;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);
  border:none;background:none;
  -webkit-tap-highlight-color:transparent;
}
.date-chip.selected{
  background:linear-gradient(135deg,#FFD3B6,#ffaa6e);
  box-shadow:0 4px 18px rgba(255,170,110,0.38);
  transform:scale(1.07);
}

/* ── Planner cards ── */
.goal-row{
  display:flex;align-items:center;gap:12px;padding:14px 0;
  border-bottom:1px solid #f3f3f3;cursor:pointer;
  transition:padding-left 0.15s ease;
  -webkit-tap-highlight-color:transparent;
}
.goal-row:last-child{border-bottom:none}
.goal-row:active{opacity:0.7}
.cat-card{
  background:white;border-radius:22px;padding:18px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04),0 6px 20px rgba(0,0,0,0.04);
  cursor:pointer;transition:all 0.22s ease;
  border-bottom:3px solid;
  border:1px solid rgba(255,255,255,0.9);
}
.cat-card:active{transform:scale(0.97)}

/* ── Toast notification ── */
.toast{
  position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  background:#1a1a1a;color:white;
  padding:11px 20px;border-radius:30px;
  font-size:13.5px;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,0.25);
  z-index:500;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.toast.in{animation:toastIn 0.3s cubic-bezier(.34,1.2,.64,1) forwards}
.toast.out{animation:toastOut 0.3s ease forwards}

/* ── AI Goal modal textarea ── */
.goal-textarea{
  width:100%;padding:14px 16px;border-radius:16px;
  border:1.5px solid #ebebeb;font-size:15px;
  outline:none;color:#1a1a1a;resize:none;
  background:#f9f9f9;transition:all 0.18s ease;
  line-height:1.5;
}
.goal-textarea:focus{border-color:#a78bfa;background:white;box-shadow:0 0 0 3.5px rgba(167,139,250,0.18)}

/* ── Suggestion chip ── */
.suggestion-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:500;
  background:rgba(102,126,234,0.08);color:#5b6fd4;cursor:pointer;
  border:1px solid rgba(102,126,234,0.15);
  transition:all 0.15s ease;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.suggestion-chip:active{background:rgba(102,126,234,0.15);transform:scale(0.95)}

/* ── Install banner ── */
#install-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:white;
  padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 30px rgba(0,0,0,0.1);
  display:flex;align-items:center;gap:14px;
  animation:slideUp 0.3s ease;
}
#install-banner.hidden{display:none}
.install-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#A8E6CF,#5ec99a);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.install-text{flex:1}
.install-text h3{font-size:14px;font-weight:700;color:#1a1a1a}
.install-text p{font-size:12px;color:#aaa;margin-top:2px}
.install-btn{padding:9px 18px;border-radius:50px;border:none;background:linear-gradient(135deg,#A8E6CF,#5ec99a);color:white;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.dismiss-btn{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;color:#999;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<div id="install-banner" class="hidden">
  <div class="install-icon">✅</div>
  <div class="install-text"><h3>Install TaskFlow</h3><p>Add to Home Screen for offline use</p></div>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="dismiss-btn" id="dismiss-btn">×</button>
</div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ────────────────────────────────────────────
   Constants
──────────────────────────────────────────── */
const STORAGE_KEY = "taskflow_v2";
const DAYS   = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const EMOJIS = ["💻","🧑‍💼","🎨","🍱","📞","📋","🏃","🌿","⚡","🎯","📚","💡","🎵","✈️","🏠","💰"];
const COLORS  = ["#A8E6CF","#FFD3B6","#D5C8F0","#FFE8CC","#C8E6FF","#F5C6D0"];
const TIMES   = ["7 AM","8 AM","9 AM","10 AM","11 AM","12 PM","1 PM","2 PM","3 PM","4 PM","5 PM","6 PM","7 PM","8 PM"];
const GOAL_SUGGESTIONS = ["Be more productive at work","Get fit and healthy","Study for exams","Plan a creative project","Organize my finances","Improve my morning routine"];

const CATEGORIES = [
  { label:"Work",     emoji:"💼", color:"#FFD3B6" },
  { label:"Health",   emoji:"💪", color:"#A8E6CF" },
  { label:"Study",    emoji:"📚", color:"#D5C8F0" },
  { label:"Personal", emoji:"🌸", color:"#F5C6D0" },
];

const defaults = {
  tasks: [
    { id:1, title:"Morning meditation 🧘", done:true,  ai:false, createdAt: Date.now()-86400000 },

function loadData() {
  try { const s=localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : defaults; }
  catch { return defaults; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch {} }

function getDates() {
  const t=new Date();
  return Array.from({length:14},(_,i)=>{ const d=new Date(t); d.setDate(t.getDate()-3+i); return d; });
}
function parseTime(t) {
  const [h,pm]=t.split(" "); let hr=parseInt(h);
  if(pm==="PM"&&hr!==12)hr+=12; if(pm==="AM"&&hr===12)hr=0; return hr;
}

/* ────────────────────────────────────────────
   AI Plan My Day Modal
──────────────────────────────────────────── */
function PlanModal({ onClose, onAdd }) {
  const [goal,    setGoal]    = useState("");
  const [loading, setLoading] = useState(false);
  const [tasks,   setTasks]   = useState(null);
  const [error,   setError]   = useState(null);

  const generate = async (g) => {
    const input = g ?? goal;
    if (!input.trim()) return;
    setLoading(true); setTasks(null); setError(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are a productivity assistant. The user gives you a goal and you generate 4-5 concrete, actionable tasks for today to help achieve that goal. 
Respond ONLY with a valid JSON array of objects. Each object has:
- "title": string (short, action-oriented, max 60 chars, may include 1 relevant emoji at start)
- "priority": "high" | "medium" | "low"
No markdown, no explanation, just the raw JSON array.`,
          messages: [{ role:"user", content:`My goal for today: ${input.trim()}` }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text || "[]";
      const cleaned = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(cleaned);
      setTasks(Array.isArray(parsed) ? parsed : []);
    } catch(e) {
      setError("Couldn't generate tasks. Please try again.");
    }
    setLoading(false);
  };

  const addAll = () => {
    if (!tasks) return;
    tasks.forEach(t => onAdd(t.title, true));
    onClose();
  };

  return (
    <Modal onClose={onClose}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
        <div style={{width:42,height:42,borderRadius:14,background:"linear-gradient(135deg,#667eea,#764ba2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>✨</div>
        <div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:21,fontWeight:500,color:"#1a1a1a",lineHeight:1.1}}>Plan My Day</h2>
          <p style={{fontSize:12,color:"#b0b0b0",marginTop:2}}>AI-powered task generation</p>
        </div>
      </div>

      {!tasks && !loading && (
        <>
          <FormRow label="What's your main goal today?">
            <textarea className="goal-textarea" rows={3}
              value={goal} onChange={e=>setGoal(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();generate();}}}
              placeholder="e.g. Be more productive at work, study for my exam, get fit..."
            />
          </FormRow>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:20}}>
            {GOAL_SUGGESTIONS.map(s=>(
              <button key={s} className="suggestion-chip" onClick={()=>{ setGoal(s); generate(s); }}>
                {s}
              </button>
            ))}
          </div>
          {error && <p style={{color:"#ff5050",fontSize:13,marginBottom:14,textAlign:"center"}}>{error}</p>}
          <div style={{display:"flex",gap:10}}>
            <button className="pill-btn pill-btn-primary" onClick={()=>generate()} style={{flex:1,justifyContent:"center",background:"linear-gradient(135deg,#667eea,#764ba2)",boxShadow:"0 4px 16px rgba(102,126,234,0.35)"}}>
              <span>✨</span> Generate Tasks
            </button>
            <button className="pill-btn pill-btn-ghost" onClick={onClose}>Cancel</button>
          </div>
        </>
      )}

      {loading && (
        <div style={{padding:"10px 0"}}>
          <p style={{fontSize:13,color:"#b0b0b0",marginBottom:16,textAlign:"center",animation:"pulse 1.2s infinite"}}>🤖 Crafting your perfect day...</p>
          {[1,2,3,4].map(i=><div key={i} className="ai-skeleton" style={{animationDelay:`${i*0.15}s`}}/>)}
        </div>
      )}

      {tasks && (
        <>
          <div style={{marginBottom:18}}>
            {tasks.map((t,i)=>(
              <div key={i} style={{
                background:"#fafafa",borderRadius:16,padding:"13px 15px",
                marginBottom:8,display:"flex",alignItems:"flex-start",gap:11,
                border:"1px solid #f0f0f0",animation:`taskAppear 0.2s ${i*0.07}s both ease`,
              }}>
                <div style={{
                  width:8,height:8,borderRadius:"50%",flexShrink:0,marginTop:5,
                  background:t.priority==="high"?"#ff6b6b":t.priority==="medium"?"#ffd93d":"#a8e6cf"
                }}/>
                <span style={{fontSize:14.5,fontWeight:500,color:"#1a1a1a",lineHeight:1.4}}>{t.title}</span>
                <span style={{
                  marginLeft:"auto",fontSize:10,fontWeight:700,flexShrink:0,
                  color:t.priority==="high"?"#ff6b6b":t.priority==="medium"?"#e6a800":"#5ec99a",
                  background:t.priority==="high"?"#fff2f2":t.priority==="medium"?"#fff8e0":"#f0faf4",
                  padding:"3px 9px",borderRadius:20,
                }}>{t.priority}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="pill-btn pill-btn-primary" onClick={addAll} style={{flex:1,justifyContent:"center",background:"linear-gradient(135deg,#667eea,#764ba2)",boxShadow:"0 4px 16px rgba(102,126,234,0.35)"}}>
              <span>➕</span> Add {tasks.length} Tasks
            </button>
            <button className="pill-btn pill-btn-ghost" onClick={()=>{setTasks(null);setGoal("");}}>Redo</button>
          </div>
        </>
      )}
    </Modal>
  );
}

/* ────────────────────────────────────────────
   Main App
──────────────────────────────────────────── */
function App() {
  const stored = loadData();
  const [tab,          setTab]          = useState("todo");
  const [entering,     setEntering]     = useState(false);
  const [tasks,        setTasks]        = useState(stored.tasks);
  const [schedule,     setSchedule]     = useState(stored.schedule);
  const [goals,        setGoals]        = useState(stored.goals);
  const [selectedDate, setSelectedDate] = useState(new Date().getDate());

  const [showTaskInput,  setShowTaskInput]  = useState(false);
  const [newTask,        setNewTask]        = useState("");
  const [taskMenu,       setTaskMenu]       = useState(null);
  const [editingTask,    setEditingTask]    = useState(null);
  const [removingId,     setRemovingId]     = useState(null);

  const [showSchedModal, setShowSchedModal] = useState(false);
  const [schedForm,      setSchedForm]      = useState({ time:"9 AM",title:"",emoji:"💻",color:"#A8E6CF" });
  const [editSched,      setEditSched]      = useState(null);

  const [showPlanModal,  setShowPlanModal]  = useState(false);
  const [toast,          setToast]          = useState(null);

  const today = new Date();
  const dates = getDates();

  /* persist */
  useEffect(()=>{ saveData({tasks,schedule,goals}); },[tasks,schedule,goals]);

  /* toast helper */
  const showToast = useCallback((msg,emoji="✓") => {
    setToast({msg,emoji});
    setTimeout(()=>setToast(null),2200);
  },[]);

  /* tab switch */
  const switchTab = t => {
    if(t===tab) return;
    setEntering(true); setTaskMenu(null);
    setTab(t);
    setTimeout(()=>setEntering(false),250);
  };

  /* ── Task actions ── */
  const toggleTask = id => {
    setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  };
  const deleteTask = id => {
    setRemovingId(id);
    setTimeout(()=>{ setTasks(ts=>ts.filter(t=>t.id!==id)); setRemovingId(null); setTaskMenu(null); },200);
    showToast("Task deleted","🗑️");
  };
  const saveTaskTitle = (id,val) => {
    if(val.trim()) setTasks(ts=>ts.map(t=>t.id===id?{...t,title:val.trim()}:t));
  };
  const addTask = (title, isAI=false) => {
    if(!title.trim()) return;
    setTasks(ts=>[...ts,{id:Date.now()+Math.random(),title:title.trim(),done:false,ai:isAI,createdAt:Date.now()}]);
  };
  const handleAddTask = () => {
    if(newTask.trim()){ addTask(newTask); setNewTask(""); setShowTaskInput(false); showToast("Task added","✅"); }
  };
  const clearCompleted = () => {
    const count = tasks.filter(t=>t.done).length;
    setTasks(ts=>ts.filter(t=>!t.done));
    if(count) showToast(`${count} task${count>1?"s":""} cleared","🧹`);
  };

  /* ── Schedule actions ── */
  const deleteBlock = id => { setSchedule(s=>s.filter(b=>b.id!==id)); showToast("Block deleted","🗑️"); };
  const saveBlock   = (id,p) => setSchedule(s=>s.map(b=>b.id===id?{...b,...p}:b));
  const addBlock    = () => {
    if(schedForm.title.trim()){
      setSchedule(s=>[...s,{id:Date.now(),title:schedForm.title.trim(),time:schedForm.time,emoji:schedForm.emoji,color:schedForm.color}]);
      setSchedForm({time:"9 AM",title:"",emoji:"💻",color:"#A8E6CF"}); setShowSchedModal(false);
      showToast("Block added","📅");
    }
  };

  /* ── Goal actions ── */
  const toggleGoal = id => setGoals(gs=>gs.map(g=>g.id===id?{...g,done:!g.done}:g));

  const sortedSchedule = [...schedule].sort((a,b)=>parseTime(a.time)-parseTime(b.time));
  const doneCount = tasks.filter(t=>t.done).length;

  /* ── Render ── */
  return (
    <div className="app-shell" onClick={()=>setTaskMenu(null)}>

      {/* ═══════ SCREEN CONTENT ═══════ */}
      <div className={`screen ${entering?"entering":""}`}>

        {/* ══ TO-DO TAB ══ */}
        {tab==="todo" && (
          <div className="screen-pad">
            <div className="page-header">
              <div className="page-eyebrow">{DAYS[today.getDay()]} · {MONTHS_SHORT[today.getMonth()]} {today.getDate()}</div>
              <h1 className="page-title">My Day</h1>
              <div className="page-subtitle">{doneCount > 0 ? `${doneCount} of ${tasks.length} completed — great work! 🌟` : `${tasks.length} task${tasks.length!==1?"s":""} ahead of you`}</div>
              <div className="progress-row" style={{display:"flex",alignItems:"center",gap:10,marginTop:14}}>
                <div className="progress-track">
                  <div className="progress-fill" style={{width:`${(doneCount/Math.max(tasks.length,1))*100}%`}}/>
                </div>
                <span className="progress-label">{Math.round((doneCount/Math.max(tasks.length,1))*100)}%</span>
              </div>
            </div>

            {/* AI Plan Button */}
            <button className="plan-btn" onClick={()=>setShowPlanModal(true)}>
              <span style={{fontSize:18}}>✨</span>
              <span>Plan My Day with AI</span>
            </button>

            {/* Add task inline */}
            {showTaskInput && (
              <div className="add-task-box">
                <input autoFocus className="pill-input"
                  value={newTask} onChange={e=>setNewTask(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")handleAddTask();if(e.key==="Escape"){setShowTaskInput(false);setNewTask("");}}}
                  placeholder="What needs to be done? ✏️"
                  style={{marginBottom:10}}
                />
                <div style={{display:"flex",gap:8}}>
                  <button className="pill-btn pill-btn-primary" onClick={handleAddTask}>Add Task</button>
                  <button className="pill-btn pill-btn-ghost" onClick={()=>{setShowTaskInput(false);setNewTask("");}}>Cancel</button>
                </div>
              </div>
            )}

            {/* Task list */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div className="slabel" style={{marginBottom:0}}>
                Tasks <span className="slabel-count">{tasks.length}</span>
              </div>
              {doneCount > 0 && (
                <button onClick={clearCompleted} style={{fontSize:11.5,fontWeight:600,color:"#c0c0c0",border:"none",background:"none",cursor:"pointer",padding:"4px 0"}}>
                  Clear done
                </button>
              )}
            </div>

            {tasks.length===0 && (
              <div className="empty-state">
                <span className="empty-icon">🌱</span>
                <p className="empty-title">All clear!</p>
                <p className="empty-sub">No tasks yet. Tap + to add one<br/>or let AI plan your day.</p>
              </div>
            )}

            {tasks.map(task=>(
              <div key={task.id} className={`task-card ${task.done?"done-card":""} ${removingId===task.id?"removing":""}`}
                onClick={e=>e.stopPropagation()}>
                <div className={`check-circle ${task.done?"done":""}`} onClick={()=>toggleTask(task.id)}>
                  {task.done && <CheckSVG/>}
                </div>

                {editingTask?.id===task.id ? (
                  <input autoFocus className="pill-input"
                    style={{flex:1,padding:"5px 10px",marginBottom:0,fontSize:15,borderRadius:10}}
                    value={editingTask.val}
                    onChange={e=>setEditingTask({...editingTask,val:e.target.value})}
                    onBlur={()=>{saveTaskTitle(task.id,editingTask.val);setEditingTask(null);}}
                    onKeyDown={e=>{if(e.key==="Enter"){saveTaskTitle(task.id,editingTask.val);setEditingTask(null);}if(e.key==="Escape")setEditingTask(null);}}
                  />
                ) : (
                  <span className={`task-text ${task.done?"done":""}`}>{task.title}</span>
                )}

                {task.ai && !task.done && <span className="ai-badge">AI</span>}

                <button className="kebab-btn"
                  onClick={e=>{e.stopPropagation();setTaskMenu(taskMenu===task.id?null:task.id);}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="#ccc"><circle cx="12" cy="5" r="2.2"/><circle cx="12" cy="12" r="2.2"/><circle cx="12" cy="19" r="2.2"/></svg>
                </button>

                {taskMenu===task.id && (
                  <div className="ctx-menu" onClick={e=>e.stopPropagation()}>
                    <button className="ctx-item" onClick={()=>{setEditingTask({id:task.id,val:task.title});setTaskMenu(null);}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2.2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      Rename
                    </button>
                    <button className="ctx-item" onClick={()=>{toggleTask(task.id);setTaskMenu(null);}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2.2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                      {task.done?"Mark undone":"Mark done"}
                    </button>
                    <div className="ctx-separator"/>
                    <button className="ctx-item danger" onClick={()=>deleteTask(task.id)}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff5050" strokeWidth="2.2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                      Delete
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>

        {tab==="calendar" && (
          <div style={{paddingBottom:120}}>

                  </div>
                  <div style={{flex:1}}>
                    <div className="sched-card" style={{borderLeft:`3px solid ${block.color}`}}>
                      <div className="sched-emoji-box" style={{background:block.color+"28"}}>{block.emoji}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:14.5,fontWeight:600,color:"#1e1e1e",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{block.title}</p>

                      </div>
                      <button className="kebab-btn" onClick={e=>{e.stopPropagation();setEditSched({...block});}}>

                      </button>
                      <button className="kebab-btn" style={{marginLeft:-6}} onClick={()=>deleteBlock(block.id)}>

                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

        {/* ══ PLANNER TAB ══ */}
        {tab==="planner" && (
          <div className="screen-pad">
            <div className="page-header">
              <div className="page-eyebrow">Week {Math.ceil(today.getDate()/7)}</div>

            </div>

            <div className="slabel">Weekly Goals <span className="slabel-count">{goals.filter(g=>g.done).length}/{goals.length}</span></div>
            <div style={{background:"white",borderRadius:24,padding:"4px 18px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.05)",marginBottom:24,border:"1px solid rgba(255,255,255,0.8)"}}>
              <div style={{display:"flex",justifyContent:"flex-end",paddingTop:14,marginBottom:4}}>
                <span style={{background:"rgba(168,230,207,0.18)",color:"#46b87a",fontSize:11,fontWeight:700,padding:"3px 11px",borderRadius:20}}>
                  {goals.filter(g=>g.done).length}/{goals.length} done
                </span>
              </div>
              {goals.map(g=>(
                <div key={g.id} className="goal-row" onClick={()=>toggleGoal(g.id)}>
                  <div className={`check-circle ${g.done?"done":""}`}>{g.done&&<CheckSVG/>}</div>
                  <span style={{fontSize:14.5,fontWeight:500,color:g.done?"#cfcfcf":"#1e1e1e",textDecoration:g.done?"line-through":"none",transition:"all 0.2s ease"}}>{g.text}</span>
                </div>
              ))}
            </div>

            {/* Categories */}
            <div className="slabel" style={{marginBottom:14}}>Categories</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
              {CATEGORIES.map(cat=>{
                const count = tasks.filter(t=>!t.done).length;
                return(
                  <div key={cat.label} className="cat-card" style={{borderBottomColor:cat.color}}>
                    <div style={{fontSize:28,marginBottom:10}}>{cat.emoji}</div>
                    <p style={{fontSize:14,fontWeight:700,color:"#1e1e1e"}}>{cat.label}</p>
                    <p style={{fontSize:11.5,color:"#c8c8c8",marginTop:3}}>{cat.label==="Work"?tasks.filter(t=>!t.done).length:Math.floor(Math.random()*5+1)} tasks</p>
                  </div>
                );
              })}
            </div>

            {/* Mood */}
            <div style={{background:"white",borderRadius:24,padding:"18px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.04)",borderTop:"3px solid #FFD3B6",border:"1px solid rgba(255,255,255,0.8)"}}>
              <p style={{fontSize:11,fontWeight:700,color:"#c8c8c8",letterSpacing:1.3,marginBottom:13}}>HOW ARE YOU FEELING?</p>
              <div style={{display:"flex",gap:8}}>
                {["😊","😌","😐","😔","🥳"].map(e=>(
                  <button key={e}
                    onClick={ev=>{const b=ev.currentTarget;b.style.transform="scale(1.35)";b.style.background="#f0f0f0";setTimeout(()=>{b.style.transform="scale(1)";b.style.background="#f8f8f8";},300);showToast("Mood noted!","💜");}}
                    style={{fontSize:24,background:"#f8f8f8",border:"none",borderRadius:15,width:50,height:50,cursor:"pointer",transition:"all 0.2s ease"}}>
                    {e}
                  </button>
                ))}
              </div>
            </div>

            {/* AI Tip */}
            <div style={{marginTop:18,background:"linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08))",borderRadius:22,padding:"16px 18px",border:"1px solid rgba(102,126,234,0.12)"}}>
              <p style={{fontSize:11,fontWeight:700,color:"#9b8fea",letterSpacing:1.2,marginBottom:8}}>✨ AI INSIGHT</p>
              <p style={{fontSize:13.5,color:"#555",lineHeight:1.5}}>You have {tasks.filter(t=>!t.done).length} pending tasks today. Use "Plan My Day" on the Tasks tab to get AI-generated tasks aligned to your goals.</p>
              <button className="pill-btn" onClick={()=>switchTab("todo")}
                style={{marginTop:12,padding:"9px 18px",background:"linear-gradient(135deg,#667eea,#764ba2)",color:"white",fontSize:13,boxShadow:"0 3px 12px rgba(102,126,234,0.3)"}}>
                Go to Tasks →
              </button>
            </div>
          </div>
        )}
      </div>

      {/* ══ FABs ══ */}
      {tab==="todo" && (
        <button className={`fab ${showTaskInput?"open":""}`} onClick={()=>setShowTaskInput(s=>!s)}>
          <span style={{display:"block",transition:"transform 0.25s ease",transform:showTaskInput?"rotate(45deg)":"none",lineHeight:1}}>+</span>
        </button>
      )}
      {tab==="calendar" && (
        <button className="fab cal-fab" onClick={()=>setShowSchedModal(true)}>
          <span style={{lineHeight:1}}>+</span>
        </button>
      )}

      {/* ══ BOTTOM NAV ══ */}
      <div className="bottom-nav">
        {[
          {id:"todo",    label:"Tasks",
           icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>},
          {id:"calendar",label:"Schedule",
           icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
          {id:"planner", label:"Planner",
           icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>},
        ].map(({id,label,icon})=>(
          <button key={id} className={`nav-btn ${tab===id?"active":""}`} onClick={()=>switchTab(id)}>
            <div className="icon-wrap">
              <span style={{color:tab===id?"white":"#d0d0d0",display:"flex"}}>{icon}</span>
            </div>
            <span>{label}</span>
          </button>
        ))}
      </div>

      {/* ══ MODALS ══ */}

      {/* Add schedule */}
      {showSchedModal && (
        <Modal title="Add Time Block" onClose={()=>setShowSchedModal(false)}>
          <FormRow label="Time">
            <select className="pill-input" value={schedForm.time} onChange={e=>setSchedForm({...schedForm,time:e.target.value})} style={{padding:"13px 14px"}}>
              {TIMES.map(t=><option key={t}>{t}</option>)}
            </select>
          </FormRow>
          <FormRow label="Title">
            <input autoFocus className="pill-input" value={schedForm.title}
              onChange={e=>setSchedForm({...schedForm,title:e.target.value})}
              onKeyDown={e=>e.key==="Enter"&&addBlock()}
              placeholder="What's happening?"/>
          </FormRow>
          <FormRow label="Emoji">
            <div className="emoji-pick">{EMOJIS.map(em=><button key={em} className={`ep-btn ${schedForm.emoji===em?"sel":""}`} onClick={()=>setSchedForm({...schedForm,emoji:em})}>{em}</button>)}</div>
          </FormRow>
          <FormRow label="Color">
            <div className="color-row">{COLORS.map(c=><div key={c} className={`c-dot ${schedForm.color===c?"sel":""}`} style={{background:c}} onClick={()=>setSchedForm({...schedForm,color:c})}/>)}</div>
          </FormRow>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="pill-btn pill-btn-primary" onClick={addBlock} style={{flex:1,justifyContent:"center",background:"linear-gradient(135deg,#FFD3B6,#ffaa6e)",boxShadow:"0 4px 14px rgba(255,170,110,0.35)"}}>Add Block</button>
            <button className="pill-btn pill-btn-ghost" onClick={()=>setShowSchedModal(false)}>Cancel</button>
          </div>
        </Modal>
      )}

      {/* Edit schedule */}
      {editSched && (
        <Modal title="Edit Block" onClose={()=>setEditSched(null)}>
          <FormRow label="Time">
            <select className="pill-input" value={editSched.time} onChange={e=>setEditSched({...editSched,time:e.target.value})} style={{padding:"13px 14px"}}>
              {TIMES.map(t=><option key={t}>{t}</option>)}
            </select>
          </FormRow>
          <FormRow label="Title">
            <input className="pill-input" value={editSched.title}
              onChange={e=>setEditSched({...editSched,title:e.target.value})}
              onKeyDown={e=>e.key==="Enter"&&(saveBlock(editSched.id,editSched),setEditSched(null))}/>
          </FormRow>
          <FormRow label="Emoji">
            <div className="emoji-pick">{EMOJIS.map(em=><button key={em} className={`ep-btn ${editSched.emoji===em?"sel":""}`} onClick={()=>setEditSched({...editSched,emoji:em})}>{em}</button>)}</div>
          </FormRow>
          <FormRow label="Color">
            <div className="color-row">{COLORS.map(c=><div key={c} className={`c-dot ${editSched.color===c?"sel":""}`} style={{background:c}} onClick={()=>setEditSched({...editSched,color:c})}/>)}</div>
          </FormRow>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="pill-btn pill-btn-primary" onClick={()=>{saveBlock(editSched.id,editSched);setEditSched(null);showToast("Block saved","✅");}} style={{flex:1,justifyContent:"center"}}>Save</button>
            <button className="pill-btn pill-btn-danger" onClick={()=>{deleteBlock(editSched.id);setEditSched(null);}}>Delete</button>
          </div>
        </Modal>
      )}

      {/* Plan My Day modal */}
      {showPlanModal && (
        <PlanModal
          onClose={()=>setShowPlanModal(false)}
          onAdd={(title,isAI)=>{ addTask(title,isAI); }}
        />
      )}
      {showPlanModal===false && null}

      {/* Toast */}
      {toast && <Toast msg={toast.msg} emoji={toast.emoji}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
/* ── Service Worker ── */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

/* ── Install prompt ── */
let deferredPrompt=null;
const banner=document.getElementById("install-banner");
const installBtn=document.getElementById("install-btn");
const dismissBtn=document.getElementById("dismiss-btn");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;banner.classList.remove("hidden");});
installBtn.addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;banner.classList.add("hidden");});
dismissBtn.addEventListener("click",()=>banner.classList.add("hidden"));
window.addEventListener("appinstalled",()=>{banner.classList.add("hidden");deferredPrompt=null;});
</script>
</body>
</html>
